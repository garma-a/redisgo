root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/redisgo ./cmd/main.go"
  bin = "./tmp/redisgo"
  delay = 1000
  include_ext = ["go", "toml"]
  exclude_dir = ["tmp", "vendor", ".git"]
  exclude_regex = ["_test\\.go$"]
  stop_on_error = true

[log]
  time = true

[color]
  main = "yellow"
  watcher = "cyan"
  build = "green"
  runner = "magenta"
